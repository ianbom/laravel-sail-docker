services:
  web:
    image: laravel-sail-web-prod
    build:
      context: .
      dockerfile: docker/production/nginx/Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      php-fpm:
        condition: service_started
    restart: unless-stopped
    networks:
      - frontend

  php-fpm:
    image: laravel-sail-php-fpm-prod
    build:
      context: .
      dockerfile: docker/common/php-fpm/Dockerfile
      target: production
    env_file:
      - .env.docker.example
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${PROD_APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${PROD_DB_DATABASE:-laravel}
      DB_USERNAME: ${PROD_DB_USERNAME:-laravel}
      DB_PASSWORD: ${PROD_DB_PASSWORD:-secret}
      REDIS_HOST: redis
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - frontend
      - backend

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${PROD_DB_DATABASE:-laravel}
      MYSQL_USER: ${PROD_DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${PROD_DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${PROD_MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true

volumes:
  mysql-data: