services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www
      - ./docker/development/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      php-fpm:
        condition: service_started
    networks:
      - laravel

  php-fpm:
    image: laravel-sail-php-fpm-dev
    build:
      context: .
      dockerfile: docker/common/php-fpm/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-false}
        XDEBUG_MODE: ${XDEBUG_MODE:-develop,coverage,debug}
        XDEBUG_HOST: ${XDEBUG_HOST:-host.docker.internal}
        XDEBUG_IDE_KEY: ${XDEBUG_IDE_KEY:-DOCKER}
    env_file:
      - .env
    environment:
      APP_URL: ${DOCKER_APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DOCKER_DB_DATABASE:-laravel}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-laravel}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      REDIS_HOST: redis
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - laravel

  workspace:
    image: laravel-sail-workspace-dev
    build:
      context: .
      dockerfile: docker/development/workspace/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        NODE_VERSION: ${NODE_VERSION:-22}
    tty: true
    stdin_open: true
    ports:
      - "${VITE_PORT:-5173}:5173"
    env_file:
      - .env
    environment:
      APP_URL: ${DOCKER_APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DOCKER_DB_DATABASE:-laravel}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-laravel}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      REDIS_HOST: redis
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - laravel

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DOCKER_DB_DATABASE:-laravel}
      MYSQL_USER: ${DOCKER_DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - laravel

  redis:
    image: redis:7-alpine
    networks:
      - laravel

networks:
  laravel:

volumes:
  mysql-data: